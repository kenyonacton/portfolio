<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kenyon Acton</title>
  <meta name="description" content="Kenyon Acton — systems thinker, data scientist, multilingual analyst." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #1E5A6B; color: #F0ECEB; }
    ::selection { background: rgba(214,110,108,0.35); }
    a { color: #6CBFC6; text-decoration: none; }
    a:hover { opacity: 0.8; }
    @keyframes floatUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Palette pulled directly from the flyers ── */
    const C = {
      deepTeal:   "#1E5A6B",   /* darkest bg — deep navy teal */
      midTeal:    "#2B7F7C",   /* section bg — medium teal */
      lightTeal:  "#3A9998",   /* card surfaces */
      aqua:       "#6CBFC6",   /* links, highlights */
      coral:      "#D86E6C",   /* accent — warm coral */
      coralLight: "#E8A09E",   /* soft coral for tags */
      cream:      "#F0ECEB",   /* primary text */
      creamMuted: "#C8D8DA",   /* secondary text */
      creamFaint: "#9BBFC3",   /* tertiary text */
      cardBg:     "#245E6F",   /* card background */
      cardBorder: "#2E7580",   /* card border */
    };
    const H = "'Outfit', sans-serif";

    function useInView(t = 0.1) {
      const ref = useRef(null); const [v, setV] = useState(false);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); o.unobserve(el); } }, { threshold: t });
        o.observe(el); return () => o.disconnect();
      }, [t]);
      return [ref, v];
    }
    function FadeIn({ children, delay = 0, style = {} }) {
      const [ref, v] = useInView();
      return <div ref={ref} style={{ opacity: v?1:0, transform: v?"translateY(0)":"translateY(20px)", transition: `opacity 0.65s ease ${delay}s, transform 0.65s ease ${delay}s`, ...style }}>{children}</div>;
    }

    /* Wavy divider SVG between sections */
    function Wave({ flip = false, from = C.deepTeal, to = C.midTeal }) {
      return (
        <div style={{ lineHeight: 0, background: flip ? to : from }}>
          <svg viewBox="0 0 1200 60" preserveAspectRatio="none" style={{ display: "block", width: "100%", height: 60 }}>
            <path d={flip
              ? "M0,0 C300,60 900,60 1200,0 L1200,60 L0,60 Z"
              : "M0,60 C300,0 900,0 1200,60 L1200,0 L0,0 Z"}
              fill={flip ? from : to} />
          </svg>
        </div>
      );
    }

    /* ── HERO ── */
    function Hero() {
      const go = id => document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
      return (
        <section style={{ background: C.deepTeal, padding: "100px 24px 40px", position: "relative", overflow: "hidden" }}>
          {/* Subtle decorative circles inspired by the flyer's organic shapes */}
          <div style={{ position:"absolute", top:-80, right:-80, width:320, height:320, borderRadius:"50%", background:`${C.coral}10`, pointerEvents:"none" }} />
          <div style={{ position:"absolute", bottom:20, left:-60, width:200, height:200, borderRadius:"50%", background:`${C.aqua}08`, pointerEvents:"none" }} />
          <div style={{ maxWidth: 740, margin: "0 auto", display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center", position:"relative", zIndex:1 }}>
            <FadeIn>
              <img src="headshot.jpg" alt="Kenyon Acton"
                style={{ width:156, height:156, borderRadius:"50%", objectFit:"cover", objectPosition:"center top",
                  border:`4px solid ${C.coral}`, boxShadow:`0 0 0 8px ${C.coral}22`, marginBottom:28 }} />
            </FadeIn>
            <FadeIn delay={0.1}>
              <h1 style={{ fontFamily:H, fontSize:"clamp(36px,6vw,60px)", fontWeight:700, color:C.cream, lineHeight:1.1, marginBottom:14 }}>
                Kenyon Acton
              </h1>
            </FadeIn>
            <FadeIn delay={0.2}>
              <p style={{ fontSize:14, color:C.aqua, fontWeight:500, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:22 }}>
                Data Scientist · Systems Thinker · Multilingual Analyst
              </p>
            </FadeIn>
            <FadeIn delay={0.3}>
              <p style={{ fontSize:"clamp(15px,2.2vw,17px)", color:C.creamMuted, lineHeight:1.8, maxWidth:560, marginBottom:36 }}>
                I build solutions at the intersection of compliance, data engineering, and multilingual systems. From leading investigative analysis across 20+ language datasets to directing LED installations at the UNESCO International Year of Light, I bring systems thinking and cross-functional leadership to every problem.
              </p>
            </FadeIn>
            <FadeIn delay={0.4}>
              <div style={{ display:"flex", gap:12, flexWrap:"wrap", justifyContent:"center" }}>
                <button onClick={() => go("work")}
                  style={{ fontFamily:"'DM Sans'", fontSize:14, fontWeight:600, padding:"12px 28px", borderRadius:30, border:"none", cursor:"pointer", background:C.coral, color:C.cream, letterSpacing:"0.02em" }}>
                  See My Work
                </button>
                <button onClick={() => go("contact")}
                  style={{ fontFamily:"'DM Sans'", fontSize:14, fontWeight:600, padding:"12px 28px", borderRadius:30, cursor:"pointer", background:"transparent", color:C.cream, border:`2px solid ${C.cream}44`, letterSpacing:"0.02em" }}>
                  Get in Touch
                </button>
              </div>
            </FadeIn>
          </div>
        </section>
      );
    }

    /* ── WHAT I BRING ── */
    function WhatIDo() {
      const pillars = [
        {
          emoji: "◈",
          title: "Compliance & Data Engineering",
          body: "Built data pipelines, dashboards, and classification models at LegitScript — a global compliance and payments firm. Worked across fraud detection, brand monitoring, and regulatory research for food and drug ingredients. Established data governance protocols and documentation standards adopted across teams.",
          tags: ["Python", "SQL", "Databricks", "PySpark", "NLP", "ETL"],
        },
        {
          emoji: "◎",
          title: "Multilingual Compliance & Research",
          body: "Led investigative analysis and compliance reporting across 20+ language datasets. Updated regulatory documentation for global clients as legislative frameworks changed. Built and implemented translation tools that scaled multilingual workflows. Qualified Oregon Health Care Interpreter trained in medical terminology and HIPAA compliance.",
          tags: ["6 Languages", "Healthcare Interpreter", "Compliance Research"],
        },
        {
          emoji: "◬",
          title: "Creative Technology & Leadership",
          body: "Led production and installation of interactive LED sculptures at Light At Play — directing teams of 10–50, managing logistics for national and international tours, and contributing algorithms research. Presented at TEDx Portland and the UNESCO International Year of Light Opening Ceremony, Paris.",
          tags: ["JavaScript", "Arduino", "Team Leadership", "Project Management"],
        },
      ];
      return (
        <>
          <Wave from={C.deepTeal} to={C.midTeal} />
          <section id="work" style={{ background:C.midTeal, padding:"60px 24px 80px" }}>
            <div style={{ maxWidth:980, margin:"0 auto" }}>
              <FadeIn>
                <h2 style={{ fontFamily:H, fontSize:"clamp(24px,4vw,32px)", fontWeight:600, color:C.cream, textAlign:"center", marginBottom:44 }}>
                  What I Bring
                </h2>
              </FadeIn>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(270px, 1fr))", gap:18 }}>
                {pillars.map((p, i) => (
                  <FadeIn key={i} delay={i*0.1}>
                    <div style={{ background:C.cardBg, borderRadius:16, padding:28, border:`1px solid ${C.cardBorder}`, height:"100%" }}>
                      <div style={{ fontSize:22, color:C.coral, marginBottom:12, fontFamily:H }}>{p.emoji}</div>
                      <h3 style={{ fontFamily:H, fontSize:17, fontWeight:600, color:C.cream, marginBottom:10 }}>{p.title}</h3>
                      <p style={{ fontSize:14, color:C.creamMuted, lineHeight:1.75, marginBottom:16 }}>{p.body}</p>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                        {p.tags.map(t => (
                          <span key={t} style={{ fontSize:11, fontWeight:500, padding:"3px 10px", borderRadius:20, background:`${C.coral}22`, color:C.coralLight }}>
                            {t}
                          </span>
                        ))}
                      </div>
                    </div>
                  </FadeIn>
                ))}
              </div>
            </div>
          </section>
          <Wave flip from={C.midTeal} to={C.deepTeal} />
        </>
      );
    }

    /* ── LED ── */
    function Creative() {
      return (
        <section style={{ background:C.deepTeal, padding:"60px 24px 80px" }}>
          <div style={{ maxWidth:960, margin:"0 auto" }}>
            <FadeIn>
              <h2 style={{ fontFamily:H, fontSize:"clamp(24px,4vw,32px)", fontWeight:600, color:C.cream, marginBottom:10 }}>
                The Radiance Orb
              </h2>
              <p style={{ fontSize:15, color:C.creamMuted, lineHeight:1.75, maxWidth:580, marginBottom:36 }}>
                A geodesic LED dome with hundreds of individually programmable panels. I directed production, developed prototypes, contributed algorithms research, and coordinated logistics for national and international tours.
              </p>
            </FadeIn>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(300px, 1fr))", gap:16, marginBottom:32 }}>
              <FadeIn delay={0.1}>
                <div style={{ borderRadius:14, overflow:"hidden", border:`1px solid ${C.cardBorder}` }}>
                  <img src="led-dome.jpg" alt="The Radiance Orb" style={{ width:"100%", aspectRatio:"3/2", objectFit:"cover", display:"block" }} />
                </div>
              </FadeIn>
              <FadeIn delay={0.2}>
                <div style={{ borderRadius:14, overflow:"hidden", border:`1px solid ${C.cardBorder}` }}>
                  <img src="led-detail.jpg" alt="LED panel detail" style={{ width:"100%", aspectRatio:"3/2", objectFit:"cover", display:"block" }} />
                </div>
              </FadeIn>
            </div>
            <FadeIn delay={0.3}>
              <div style={{ display:"flex", flexWrap:"wrap", gap:10, alignItems:"center" }}>
                {[{ place:"TEDx Portland", year:"2017" }, { place:"Int'l Year of Light, UNESCO", year:"2015" }, { place:"Just Imagine Award", year:"2013" }].map((a,i) => (
                  <div key={i} style={{ background:C.cardBg, borderRadius:30, padding:"8px 18px", border:`1px solid ${C.cardBorder}`, display:"flex", gap:8, alignItems:"baseline" }}>
                    <span style={{ fontFamily:H, fontSize:13, fontWeight:600, color:C.cream }}>{a.place}</span>
                    <span style={{ fontSize:12, color:C.creamFaint }}>{a.year}</span>
                  </div>
                ))}
                <a href="https://www.youtube.com/watch?v=Wyy08-DGeXQ" target="_blank" rel="noopener noreferrer"
                  style={{ fontSize:13, fontWeight:500, color:C.coral }}>
                  Watch at TEDx →
                </a>
              </div>
            </FadeIn>
          </div>
        </section>
      );
    }

    /* ── WHAT'S NEXT ── */
    function Currently() {
      return (
        <>
          <Wave from={C.deepTeal} to={C.midTeal} />
          <section style={{ background:C.midTeal, padding:"60px 24px 80px" }}>
            <div style={{ maxWidth:660, margin:"0 auto", textAlign:"center" }}>
              <FadeIn>
                <h2 style={{ fontFamily:H, fontSize:"clamp(24px,4vw,32px)", fontWeight:600, color:C.cream, marginBottom:16 }}>
                  What's Next
                </h2>
                <p style={{ fontSize:15, color:C.creamMuted, lineHeight:1.8, marginBottom:16 }}>
                  Currently building AI-powered tools through the{" "}
                  <a href="https://suresh-srinivas.github.io/skill-forward/" target="_blank" rel="noopener noreferrer">Skill Forward</a>{" "}
                  bootcamp — shipping deployed solutions with public demos and documentation.
                </p>
                <p style={{ fontSize:15, color:C.creamMuted, lineHeight:1.8, marginBottom:28 }}>
                  M.S. Data Science, Regis University · B.A. Marlboro College. Looking for roles where systems thinking and multilingual capability create real value.
                </p>
                <div style={{ display:"flex", flexWrap:"wrap", gap:10, justifyContent:"center" }}>
                  {["GRC & Compliance", "Data Governance", "International Programs", "AI Applications"].map(t => (
                    <span key={t} style={{ fontSize:13, fontWeight:500, padding:"8px 18px", borderRadius:24, border:`1px solid ${C.aqua}55`, color:C.aqua }}>
                      {t}
                    </span>
                  ))}
                </div>
              </FadeIn>
            </div>
          </section>
          <Wave flip from={C.midTeal} to={C.deepTeal} />
        </>
      );
    }

    /* ── CONTACT ── */
    function Contact() {
      return (
        <section id="contact" style={{ background:C.deepTeal, padding:"60px 24px 80px" }}>
          <div style={{ maxWidth:480, margin:"0 auto", textAlign:"center" }}>
            <FadeIn>
              <h2 style={{ fontFamily:H, fontSize:"clamp(24px,4vw,32px)", fontWeight:600, color:C.cream, marginBottom:10 }}>
                Let's Talk
              </h2>
              <p style={{ fontSize:15, color:C.creamMuted, marginBottom:32 }}>I'd love to hear from you.</p>
              <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" }}>
                {["LinkedIn", "GitHub"].map(p => (
                  <a key={p} href="#"
                    style={{ fontSize:15, fontWeight:600, color:C.coral, padding:"12px 28px", borderRadius:30, border:`2px solid ${C.coral}55`, textDecoration:"none" }}>
                    {p}
                  </a>
                ))}
              </div>
            </FadeIn>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer style={{ padding:"24px", background:"#163D4A", textAlign:"center" }}>
          <p style={{ fontSize:12, color:`${C.creamFaint}88` }}>© 2026 Kenyon Acton · Portland, OR</p>
        </footer>
      );
    }

    function App() {
      return (
        <div style={{ background:C.deepTeal, minHeight:"100vh" }}>
          <Hero />
          <WhatIDo />
          <Creative />
          <Currently />
          <Contact />
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
