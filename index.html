<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kenyon Acton</title>
  <meta name="description" content="Kenyon Acton — systems thinker, data scientist, multilingual analyst." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* Atkinson Hyperlegible — self-hosted to avoid third-party tracking */
    @font-face {
      font-family: "Atkinson Hyperlegible";
      src: url("assets/fonts/atkinson/atkinson-hyperlegible-v12-latin-regular.woff2") format("woff2"),
           local("Atkinson Hyperlegible");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Atkinson Hyperlegible";
      src: url("assets/fonts/atkinson/atkinson-hyperlegible-v12-latin-700.woff2") format("woff2"),
           local("Atkinson Hyperlegible Bold");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: #1E5A6B; color: #F0ECEB; }
    ::selection { background: rgba(214,110,108,0.35); }
    a { color: #6CBFC6; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 3px; }
    a:hover { opacity: 0.8; }
    @keyframes floatUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ── Palette pulled directly from the flyers ── */
    const C = {
      deepTeal:   "#1E5A6B",   /* darkest bg — deep navy teal */
      midTeal:    "#2B7F7C",   /* section bg — medium teal */
      lightTeal:  "#3A9998",   /* card surfaces */
      aqua:       "#6CBFC6",   /* links, highlights */
      coral:      "#D86E6C",   /* accent — warm coral (button bg, chip tint, accent text) */
      inkNavy:    "#082A35",   /* button text on coral — passes AA */
      inkTeal:    "#051D26",   /* deep ink — Hero bg + card bg, lets coral text pass AA */
      chipTeal:   "#1F6664",   /* darker mid-teal — chip pill bg, lets cream read at 5+ AA */
      cream:      "#F0ECEB",   /* primary text */
      creamMuted: "#C8D8DA",   /* secondary text */
      creamFaint: "#9BBFC3",   /* tertiary text */
      cardBg:     "#0F3540",   /* card background — softer than Hero ink, calmer overall contrast */
      cardBorder: "#2E7580",   /* card border */
    };
    const H = "'Outfit', sans-serif";

    function useInView(t = 0.1) {
      const ref = useRef(null); const [v, setV] = useState(false);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); o.unobserve(el); } }, { threshold: t });
        o.observe(el); return () => o.disconnect();
      }, [t]);
      return [ref, v];
    }
    function FadeIn({ children, delay = 0, style = {} }) {
      const [ref, v] = useInView();
      return <div ref={ref} style={{ opacity: v?1:0, transform: v?"translateY(0)":"translateY(20px)", transition: `opacity 0.65s ease ${delay}s, transform 0.65s ease ${delay}s`, ...style }}>{children}</div>;
    }

    /* Wavy divider SVG between sections */
    function Wave({ flip = false, from = C.deepTeal, to = C.midTeal }) {
      return (
        <div style={{ lineHeight: 0, background: flip ? to : from }}>
          <svg viewBox="0 0 1200 60" preserveAspectRatio="none" style={{ display: "block", width: "100%", height: 60 }}>
            <path d={flip
              ? "M0,0 C300,60 900,60 1200,0 L1200,60 L0,60 Z"
              : "M0,60 C300,0 900,0 1200,60 L1200,0 L0,0 Z"}
              fill={flip ? from : to} />
          </svg>
        </div>
      );
    }

    /* ── HERO ── */
    function Hero() {
      const go = id => document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
      return (
        <section style={{ background: C.deepTeal, padding: "100px 24px 40px", position: "relative", overflow: "hidden" }}>
          {/* Quiet aqua bubbles — matches the rest of the page */}
          <div style={{ position:"absolute", top:-80, right:-80, width:320, height:320, borderRadius:"50%", background:`${C.aqua}28`, pointerEvents:"none" }} />
          <div style={{ position:"absolute", bottom:20, left:-60, width:200, height:200, borderRadius:"50%", background:`${C.aqua}1F`, pointerEvents:"none" }} />
          <div style={{ position:"absolute", top:60, left:"15%", width:60, height:60, borderRadius:"50%", background:`${C.aqua}22`, pointerEvents:"none" }} />
          <div style={{ position:"absolute", bottom:80, right:"18%", width:36, height:36, borderRadius:"50%", background:`${C.aqua}33`, pointerEvents:"none" }} />
          <div style={{ maxWidth: 740, margin: "0 auto", display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center", position:"relative", zIndex:1 }}>
            <FadeIn>
              <img src="headshot.jpg" alt="Kenyon Acton"
                style={{ width:156, height:156, borderRadius:"50%", objectFit:"cover", objectPosition:"center top",
                  border:`4px solid ${C.aqua}`, boxShadow:`0 0 0 8px ${C.aqua}33`, marginBottom:28 }} />
            </FadeIn>
            <FadeIn delay={0.1}>
              <h1 style={{ fontFamily:H, fontSize:"clamp(36px,6vw,60px)", fontWeight:700, color:C.aqua, lineHeight:1.1, marginBottom:14 }}>
                Kenyon Acton
              </h1>
            </FadeIn>
            <FadeIn delay={0.2}>
              <p style={{ fontSize:14, color:C.coral, fontWeight:600, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:22 }}>
                Data Scientist · Compliance Analyst · Multilingual Professional
              </p>
            </FadeIn>
            <FadeIn delay={0.3}>
              <p style={{ fontSize:"clamp(15px,2.2vw,17px)", color:C.creamMuted, lineHeight:1.8, maxWidth:560, marginBottom:36 }}>
                I translate between policy, technical systems, and the people using them. From compliance analytics across global markets to AI-native product builds and large-scale interactive installations, I bring scope discipline, design thinking, and careful articulation to ambitious projects.
              </p>
            </FadeIn>
            <FadeIn delay={0.4}>
              <div style={{ display:"flex", gap:12, flexWrap:"wrap", justifyContent:"center" }}>
                <button onClick={() => go("work")}
                  style={{ fontFamily:"'DM Sans'", fontSize:14, fontWeight:600, padding:"12px 28px", borderRadius:30, border:"none", cursor:"pointer", background:C.coral, color:C.inkNavy, letterSpacing:"0.02em" }}>
                  See My Work
                </button>
                <button onClick={() => go("contact")}
                  style={{ fontFamily:"'DM Sans'", fontSize:14, fontWeight:600, padding:"12px 28px", borderRadius:30, cursor:"pointer", background:C.coral, color:C.inkNavy, border:"none", letterSpacing:"0.02em" }}>
                  Get in Touch
                </button>
              </div>
            </FadeIn>
          </div>
        </section>
      );
    }

    /* ── WHAT I BRING ── */
    function WhatIDo() {
      const pillars = [
        {
          title: "Data Engineering & Analytics",
          body: "I build data infrastructure that supports decision-making at scale. My work covers data governance, ETL pipelines, and machine learning models — with an emphasis on documentation and standards that hold up across cross-functional teams.",
          tags: ["Python", "SQL", "Databricks", "PySpark", "Machine Learning", "AWS"],
        },
        {
          title: "Compliance Research & Multilingual Analysis",
          body: "I work where regulation, language, and risk intersect. Over four years at a global compliance firm, I led investigative research into fraud patterns, payments data, and food and drug ingredient safety, applying bilingual fluency across multilingual datasets.",
          tags: ["Investigative Research", "Risk Analysis", "Bilingual (Spanish / English)", "Regulatory Domain"],
        },
        {
          title: "Creative Technology & Leadership",
          body: "I direct technical teams from concept through delivery. At Light At Play, I led production of interactive LED installations with teams of 10–50, contributing algorithms research for work presented at TEDx Portland and the UNESCO International Year of Light, Paris.",
          tags: ["Team Leadership", "Project Management", "JavaScript", "Arduino", "Creative Direction"],
        },
      ];
      return (
        <>
          <Wave from={C.deepTeal} to={C.midTeal} />
          <section style={{ background:C.midTeal, padding:"60px 24px 80px" }}>
            <div style={{ maxWidth:980, margin:"0 auto" }}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(270px, 1fr))", gap:18 }}>
                {pillars.map((p, i) => (
                  <FadeIn key={i} delay={i*0.1}>
                    <div style={{ background:C.cardBg, borderRadius:16, padding:28, height:"100%" }}>
                      <h3 style={{ fontFamily:H, fontSize:17, fontWeight:600, color:C.coral, marginBottom:10 }}>{p.title}</h3>
                      <p style={{ fontSize:14, color:C.creamFaint, lineHeight:1.75, marginBottom:16 }}>{p.body}</p>
                      <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                        {p.tags.map(t => (
                          <span key={t} style={{ fontSize:11, fontWeight:500, padding:"4px 11px", borderRadius:20, background:C.chipTeal, color:C.cream }}>
                            {t}
                          </span>
                        ))}
                      </div>
                    </div>
                  </FadeIn>
                ))}
              </div>
            </div>
          </section>
          <Wave flip from={C.midTeal} to={C.deepTeal} />
        </>
      );
    }

    /* ── PROJECTS ── */
    function Projects() {
      const primaryBtn = { display:"inline-block", fontFamily:"'DM Sans'", fontSize:14, fontWeight:600, padding:"12px 28px", borderRadius:30, background:C.coral, color:C.inkNavy, textDecoration:"none", letterSpacing:"0.02em", border:"none" };
      const disabledBtn = { display:"inline-block", fontFamily:"'DM Sans'", fontSize:14, fontWeight:600, padding:"12px 28px", borderRadius:30, background:"transparent", color:`${C.creamFaint}99`, letterSpacing:"0.02em", border:`1px dashed ${C.creamFaint}55`, cursor:"not-allowed" };
      const tagPill = { fontSize:11, fontWeight:500, padding:"4px 11px", borderRadius:20, background:C.chipTeal, color:C.cream };

      // Wonder Practices — local data + components (kept inline per the card's design)
      const wpHeroFont = "'Atkinson Hyperlegible', system-ui, -apple-system, 'Segoe UI', sans-serif";
      const wpMountains = [
        { key:"quiet",       opacity:0.62, d:"M 0,300 L 25,290 L 55,277 L 92,258 L 130,235 L 165,218 L 192,212 L 215,205 L 240,215 L 268,232 L 295,250 L 322,258 L 340,254 L 365,265 L 400,285 L 460,300 Z" },
        { key:"active",      opacity:0.72, d:"M 200,300 L 225,294 L 260,278 L 297,254 L 325,232 L 340,228 L 358,200 L 380,165 L 398,135 L 415,128 L 430,120 L 445,130 L 460,148 L 480,178 L 495,195 L 510,200 L 530,225 L 555,250 L 585,275 L 615,290 L 645,300 Z" },
        { key:"bodyIntense", opacity:0.82, d:"M 390,300 L 425,278 L 462,250 L 495,222 L 525,202 L 542,196 L 555,200 L 565,203 L 575,188 L 588,165 L 595,155 L 600,148 L 608,156 L 618,168 L 628,172 L 638,165 L 650,178 L 668,200 L 695,228 L 730,260 L 770,287 L 810,300 Z" },
        { key:"tender",      opacity:0.9,  d:"M 570,300 L 595,295 L 635,282 L 670,265 L 700,248 L 727,235 L 750,228 L 760,225 L 770,222 L 780,223 L 790,224 L 800,222 L 810,220 L 820,222 L 833,225 L 857,238 L 885,258 L 915,275 L 945,290 L 975,300 Z" },
      ];
      const wpPalettes = {
        trichromatic:  { quiet:"#3D5878", active:"#2A8E7E", bodyIntense:"#3D3A6E", tender:"#5B4D72" },
        deuteranopia:  { quiet:"#475778", active:"#7E7E72", bodyIntense:"#3F3B6E", tender:"#564D72" },
        protanopia:    { quiet:"#4A5778", active:"#878375", bodyIntense:"#393A6E", tender:"#514D72" },
        tritanopia:    { quiet:"#305F62", active:"#139489", bodyIntense:"#34424A", tender:"#585158" },
        achromatopsia: { quiet:"#545454", active:"#6E6E6E", bodyIntense:"#404040", tender:"#585858" },
      };
      const wpLabels = [
        { key:"quiet", name:"Quiet", x:15,
          symbol:(<svg width="19" height="19" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="4.5" fill="#7DA0D0" /></svg>) },
        { key:"active", name:"Active", x:265,
          symbol:(<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 14 Q 7 8, 11 14 T 19 14" stroke="#5BC0A4" strokeWidth="2.8" strokeLinecap="round" fill="none" /></svg>) },
        { key:"bodyIntense", name:"Body-intense", x:515,
          symbol:(<svg width="20" height="20" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 21s-7-4.5-9-9c-1.5-3.5 1-7.5 4.5-7.5 1.8 0 3.3 0.9 4.5 2.5 1.2-1.6 2.7-2.5 4.5-2.5 3.5 0 6 4 4.5 7.5-2 4.5-9 9-9 9z" stroke="#9590C8" strokeWidth="2" fill="none" strokeLinejoin="round" /></svg>) },
        { key:"tender", name:"Tender", x:765,
          symbol:(<svg width="19" height="19" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6" fill="none" stroke="#B7A7CB" strokeWidth="2" /></svg>) },
      ];
      const WpMiniScape = ({ palette }) => (
        <svg viewBox="0 -50 1000 380" style={{ width:"100%", height:"auto", display:"block" }} aria-hidden="true">
          {wpMountains.map(m => (
            <path key={m.key} d={m.d} fill={palette[m.key]} fillOpacity={m.opacity} />
          ))}
        </svg>
      );
      const WpHeroScape = () => (
        <svg viewBox="0 -30 1000 380" style={{ width:"100%", height:"auto", display:"block" }} aria-hidden="true">
          {wpMountains.map(m => (
            <path key={m.key} d={m.d} fill={wpPalettes.trichromatic[m.key]} fillOpacity={m.opacity} />
          ))}
          {wpLabels.map(l => (
            <foreignObject key={l.key} x={l.x} y={325} width={235} height={36} style={{ overflow:"visible" }}>
              <div xmlns="http://www.w3.org/1999/xhtml" style={{ display:"flex", alignItems:"center", gap:10, fontFamily:wpHeroFont, fontSize:22, color:"#B5C5C0", lineHeight:1 }}>
                {l.symbol}
                <span>{l.name}</span>
              </div>
            </foreignObject>
          ))}
        </svg>
      );
      const wpVisionCells = [
        { key:"deuteranopia",  title:"Deuteranopia" },
        { key:"protanopia",    title:"Protanopia" },
        { key:"tritanopia",    title:"Tritanopia" },
        { key:"achromatopsia", title:"Achromatopsia" },
      ];

      return (
        <section id="work" style={{ background:C.deepTeal, padding:"60px 24px 20px" }}>
          <div style={{ maxWidth:960, margin:"0 auto" }}>
            {/* Wonder Practices */}
            <FadeIn delay={0.1}>
              <div style={{ background:C.cardBg, borderRadius:16, padding:32, border:`0.5px solid ${C.cardBorder}`, marginBottom:32 }}>
                <h3 style={{ fontFamily:"Outfit, sans-serif", fontSize:22, fontWeight:600, color:C.coral, margin:"0 0 14px", letterSpacing:"-0.01em" }}>
                  Wonder Practices
                </h3>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:18 }}>
                  {["Accessibility", "Research synthesis", "Design system"].map((tag) => (
                    <span key={tag} style={{ background:C.chipTeal, color:C.cream, padding:"5px 14px", borderRadius:20, fontFamily:"DM Sans, sans-serif", fontSize:12, fontWeight:500, letterSpacing:"0.02em" }}>
                      {tag}
                    </span>
                  ))}
                </div>
                <p style={{ fontFamily:"DM Sans, sans-serif", fontSize:14, lineHeight:1.75, color:C.creamFaint, margin:"0 0 24px" }}>
                  A library of personal practices and evidence-based research for nervous system regulation, mindfulness, movement, and communication.
                </p>
                <div style={{ marginBottom:28 }}>
                  <span style={{ background:"transparent", color:C.creamFaint, padding:"10px 22px", borderRadius:30, fontFamily:"DM Sans, sans-serif", fontSize:14, fontWeight:600, border:`1px dashed ${C.cardBorder}`, display:"inline-block", letterSpacing:"0.02em" }}>
                    Coming soon
                  </span>
                </div>
                <div style={{ height:0.5, background:C.cardBorder, margin:"0 -32px 24px" }} />
                <div style={{ background:"#163D4A", borderRadius:16, padding:"14px 14px 10px" }}>
                  <div style={{ fontFamily:wpHeroFont, fontSize:10.5, color:"#93B5B0", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>
                    Trichromatic
                  </div>
                  <WpHeroScape />
                </div>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginTop:14 }}>
                  {wpVisionCells.map(cell => (
                    <div key={cell.key} style={{ background:"#163D4A", borderRadius:8, padding:"10px 12px 8px" }}>
                      <div style={{ fontFamily:wpHeroFont, fontSize:10.5, color:"#93B5B0", letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:6 }}>
                        {cell.title}
                      </div>
                      <WpMiniScape palette={wpPalettes[cell.key]} />
                    </div>
                  ))}
                </div>
              </div>
            </FadeIn>

            {/* LED Design Projects with Light At Play */}
            <FadeIn delay={0.2}>
              <div style={{ background:C.cardBg, borderRadius:16, padding:32 }}>
                <h3 style={{ fontFamily:H, fontSize:22, fontWeight:600, color:C.coral, marginBottom:14 }}>
                  LED Design Projects with Light At Play
                </h3>
                <div style={{ display:"flex", flexWrap:"wrap", gap:6, marginBottom:16 }}>
                  {["Creative Direction", "Team Leadership", "JavaScript", "Arduino", "Algorithms Research"].map(t => (
                    <span key={t} style={tagPill}>{t}</span>
                  ))}
                </div>
                <p style={{ fontSize:14, color:C.creamFaint, lineHeight:1.75, marginBottom:20 }}>
                  Interactive LED installations developed at Light At Play. I directed production, prototyping, and algorithms research with teams of 10–50, and coordinated logistics for national and international tours. Pictured: the Radiance Dome, a geodesic structure with individually addressable LEDs. The Radiance Orb was featured at TEDx Portland and The International Year of Light, UNESCO Headquarters, Paris.
                </p>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(260px, 1fr))", gap:14, marginBottom:20 }}>
                  <div style={{ borderRadius:12, overflow:"hidden" }}>
                    <img src="led-dome.jpg" alt="The Radiance Dome" style={{ width:"100%", aspectRatio:"3/2", objectFit:"cover", display:"block" }} />
                  </div>
                  <div style={{ borderRadius:12, overflow:"hidden" }}>
                    <img src="led-cropped.jpg" alt="Light At Play LED installation" style={{ width:"100%", aspectRatio:"3/2", objectFit:"cover", display:"block" }} />
                  </div>
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:10, alignItems:"center", marginBottom:18 }}>
                  {[{ place:"TEDx Portland", year:"2017" }, { place:"International Year of Light, UNESCO", year:"2015" }, { place:"Just Imagine Award", year:"2013" }].map((a,i) => (
                    <div key={i} style={{ background:`${C.midTeal}88`, borderRadius:30, padding:"6px 14px", display:"flex", gap:8, alignItems:"baseline" }}>
                      <span style={{ fontFamily:H, fontSize:12, fontWeight:600, color:C.cream }}>{a.place}</span>
                      <span style={{ fontSize:11, color:C.creamFaint }}>{a.year}</span>
                    </div>
                  ))}
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:10 }}>
                  <a href="https://www.youtube.com/watch?v=Wyy08-DGeXQ" target="_blank" rel="noopener noreferrer" style={primaryBtn}>
                    See the Radiance Orb at TEDx
                  </a>
                </div>
              </div>
            </FadeIn>
          </div>
        </section>
      );
    }

    /* ── SKILLS & STACK ── */
    function SkillsAndStack() {
      const cardStyle = { background:C.cardBg, borderRadius:16, padding:24 };
      const labelStyle = { fontFamily:H, fontSize:14, fontWeight:600, color:C.coral, letterSpacing:"0.1em", textTransform:"uppercase", marginBottom:18 };
      const chipStyle = { fontSize:11, fontWeight:500, padding:"5px 12px", borderRadius:20, background:C.chipTeal, color:C.cream };

      const skills = ["Policy Translation", "Regulatory Domain Modeling", "Multilingual Research", "Stakeholder Collaboration", "Agentic Engineering", "Scope & Specification", "Accessibility-Aware Design"];
      const stack = ["TypeScript", "Next.js", "Python", "SQL", "R", "PySpark", "Databricks", "AWS", "Anthropic API", "Claude Code"];

      return (
        <section style={{ background:C.deepTeal, padding:"60px 24px 80px" }}>
          <div style={{ maxWidth:960, margin:"0 auto" }}>
            <FadeIn delay={0.1}>
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(280px, 1fr))", gap:18 }}>
                <div style={cardStyle}>
                  <div style={labelStyle}>Skills</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                    {skills.map(s => (
                      <span key={s} style={chipStyle}>{s}</span>
                    ))}
                  </div>
                </div>
                <div style={cardStyle}>
                  <div style={labelStyle}>Stack</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
                    {stack.map(s => (
                      <span key={s} style={chipStyle}>{s}</span>
                    ))}
                  </div>
                </div>
              </div>
            </FadeIn>
          </div>
        </section>
      );
    }

    /* ── WHAT'S NEXT ── */
    function Currently() {
      return (
        <>
          <Wave from={C.deepTeal} to={C.midTeal} />
          <section style={{ background:C.midTeal, padding:"60px 24px 80px" }}>
            <div style={{ maxWidth:660, margin:"0 auto", textAlign:"center" }}>
              <FadeIn>
                <div style={{ background:C.cardBg, borderRadius:16, padding:"40px 32px" }}>
                  <h2 style={{ fontFamily:H, fontSize:"clamp(24px,4vw,32px)", fontWeight:600, color:C.coral, marginBottom:16 }}>
                    What's Next
                  </h2>
                  <p style={{ fontSize:15, color:C.creamFaint, lineHeight:1.8, marginBottom:16 }}>
                    Currently in the{" "}
                    <a href="https://suresh-srinivas.github.io/skill-forward/" target="_blank" rel="noopener noreferrer">Skill Forward</a>{" "}
                    bootcamp — focused on agentic engineering and applied AI development.
                  </p>
                  <p style={{ fontSize:15, color:C.creamFaint, lineHeight:1.8, marginBottom:28 }}>
                    M.S. Data Science, Regis University · B.A. Marlboro College. Open to roles in GRC, data governance, compliance analytics, and international programs — wherever multilingual expertise and analytical depth drive measurable impact.
                  </p>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:7, justifyContent:"center" }}>
                    {["GRC", "Data Governance", "International Programs", "AI Applications"].map(t => (
                      <span key={t} style={{ fontSize:11, fontWeight:500, padding:"4px 11px", borderRadius:20, background:C.chipTeal, color:C.cream }}>
                        {t}
                      </span>
                    ))}
                  </div>
                </div>
              </FadeIn>
            </div>
          </section>
          <Wave flip from={C.midTeal} to={C.deepTeal} />
        </>
      );
    }

    /* ── CONTACT ── */
    function Contact() {
      return (
        <section id="contact" style={{ background:C.deepTeal, padding:"60px 24px 80px" }}>
          <div style={{ maxWidth:480, margin:"0 auto", textAlign:"center" }}>
            <FadeIn>
              <h2 style={{ fontFamily:H, fontSize:"clamp(24px,4vw,32px)", fontWeight:600, color:C.aqua, marginBottom:10 }}>
                Let's Talk
              </h2>
              <p style={{ fontSize:15, color:C.creamMuted, marginBottom:32 }}>I'd love to hear from you.</p>
              <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap" }}>
                {[
                  { label: "LinkedIn", href: "https://www.linkedin.com/in/kenyonacton/" },
                  { label: "GitHub", href: "https://github.com/kenyonacton" }
                ].map(p => (
                  <a key={p.label} href={p.href} target="_blank" rel="noopener noreferrer"
                    style={{ display:"inline-block", fontFamily:"'DM Sans'", fontSize:14, fontWeight:600, padding:"12px 28px", borderRadius:30, background:C.coral, color:C.inkNavy, textDecoration:"none", letterSpacing:"0.02em" }}>
                    {p.label}
                  </a>
                ))}
              </div>
            </FadeIn>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer style={{ padding:"24px", background:"#163D4A", textAlign:"center" }}>
          <p style={{ fontSize:12, color:`${C.creamFaint}88` }}>© 2026 Kenyon Acton</p>
        </footer>
      );
    }

    function App() {
      return (
        <div style={{ background:C.deepTeal, minHeight:"100vh" }}>
          <Hero />
          <WhatIDo />
          <Projects />
          <SkillsAndStack />
          <Currently />
          <Contact />
          <Footer />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
